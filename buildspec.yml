version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Checking environment..."
      - aws --version
      - ls -la

  pre_build:
    commands:
      - echo "Installing backend dependencies..."
      - cd Backend && npm install
      - cd ..

  build:
    commands:
      - echo "Building frontend..."
      - cd Frontend
      - npm install
      - npm run build
      - cd ..

  post_build:
    commands:
      - echo "Deploying Frontend to S3..."
      - aws s3 sync Frontend/dist/ s3://frontend-static-website1 --delete
      
      - echo "Deploying Backend via SSM..."
      - |
        COMMAND_ID=$(aws ssm send-command \
          --document-name "AWS-RunShellScript" \
          --instance-ids "i-00ae9e38be5269310" \
          --parameters 'commands=["sudo -u ubuntu -i bash -c \"cd /home/ubuntu/aws-new && git fetch origin master && git reset --hard origin/master && bash scripts/application_start.sh\""]' \
          --region ap-south-1 \
          --query "Command.CommandId" \
          --output text)
        
        echo "Command ID: $COMMAND_ID"
        echo "Waiting for command to complete..."
        
        aws ssm wait command-executed \
          --command-id "$COMMAND_ID" \
          --instance-id "i-00ae9e38be5269310" \
          --region ap-south-1
        
        echo "Command output:"
        aws ssm get-command-invocation \
          --command-id "$COMMAND_ID" \
          --instance-id "i-00ae9e38be5269310" \
          --region ap-south-1 \
          --query "StandardOutputContent" \
          --output text
        
        aws ssm get-command-invocation \
          --command-id "$COMMAND_ID" \
          --instance-id "i-00ae9e38be5269310" \
          --region ap-south-1 \
          --query "StandardErrorContent" \
          --output text

artifacts:
  files:
    - '**/*'
